<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso · Tracking de Campañas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:#f4f6fb;color:#1a1f36;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border:1px solid #e7eaf3;border-radius:18px;padding:34px 30px;max-width:380px;width:100%;
    box-shadow:0 10px 40px rgba(20,30,80,.10);text-align:center}
  .brand{background:linear-gradient(110deg,#6366f1,#8b5cf6 55%,#ec4899);border-radius:14px;padding:16px;color:#fff;margin-bottom:22px}
  .brand h1{font-size:19px;font-weight:800}
  .brand p{font-size:12px;opacity:.9;margin-top:2px}
  label{display:block;text-align:left;font-size:12px;color:#7b8499;font-weight:600;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
  input{width:100%;padding:12px 14px;border:1.5px solid #e7eaf3;border-radius:10px;font-size:14px;outline:none}
  input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:10px;background:#6366f1;color:#fff;
    font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
  button:hover{background:#4f46e5}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;font-size:13px;padding:11px;border-radius:10px;display:none}
  .msg.ok{display:block;background:#dcfce7;color:#15803d}
  .msg.err{display:block;background:#fee2e2;color:#b91c1c}
  .hint{font-size:11px;color:#9aa3b2;margin-top:14px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><h1>📈 Tracking de Campañas</h1><p>Grupo Garnier</p></div>
    <form id="f">
      <label for="email">Tu correo</label>
      <input id="email" type="email" placeholder="nombre@empresa.com" required autocomplete="email">
      <button id="btn" type="submit">Enviar enlace de acceso</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="hint">Te llegará un enlace de acceso a tu correo. Sin contraseñas.</div>
  </div>
  <script src="config.js"></script>
  <script>
    const msg=(t,cls)=>{const m=document.getElementById('msg');m.textContent=t;m.className='msg '+cls;};
    // Si ya hay sesión, al dashboard
    sb.auth.getSession().then(({data:{session}})=>{ if(session) location.replace('index.html'); });
    document.getElementById('f').addEventListener('submit', async e=>{
      e.preventDefault();
      const email=document.getElementById('email').value.trim().toLowerCase();
      const btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='Enviando…';
      const { error } = await sb.auth.signInWithOtp({
        email,
        options:{ emailRedirectTo: location.origin + location.pathname.replace(/login\.html$/,'') + 'index.html' }
      });
      btn.disabled=false; btn.textContent='Enviar enlace de acceso';
      if(error) msg('No se pudo enviar: '+error.message,'err');
      else msg('✉️ Revisa tu correo ('+email+') y abre el enlace para entrar.','ok');
    });
  </script>
</body>
</html>
