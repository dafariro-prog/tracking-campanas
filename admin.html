<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración · Tracking de Campañas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f5f5;--card:#fff;--line:#e4e4e4;--txt:#151515;--muted:#6e6e6e;--accent:#151515}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  .wrap{max-width:1100px;margin:0 auto;padding:22px}
  header{display:flex;justify-content:space-between;align-items:center;background:#151515;
    color:#fff;border-radius:16px;padding:18px 22px;margin-bottom:18px}
  header .htitle{display:flex;align-items:center;gap:12px}
  header .htitle img{height:24px;display:block}
  header h1{font-size:18px;font-weight:600}
  header .right{display:flex;gap:10px;align-items:center;font-size:12px}
  header a,header button{background:rgba(255,255,255,.18);color:#fff;border:0;border-radius:8px;padding:8px 13px;
    font-size:12px;font-weight:600;cursor:pointer;text-decoration:none}
  .grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(20,30,80,.06)}
  .card h2{font-size:15px;font-weight:600;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .rol{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px}
  .rol.admin{background:#ede9fe;color:#6d28d9}.rol.user{background:#e0f2fe;color:#0369a1}
  .scope{font-size:11px;color:var(--muted)}
  .act{display:flex;gap:6px}
  .act button{border:0;border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;font-weight:600}
  .edit{background:#eef2ff;color:#000000}.del{background:#fee2e2;color:#b91c1c}
  label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px}
  input[type=email],select{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  .checks{max-height:120px;overflow:auto;border:1.5px solid var(--line);border-radius:9px;padding:8px}
  .checks.tall{max-height:190px}
  .checks label{display:flex;align-items:center;gap:8px;margin:0;text-transform:none;font-size:12.5px;color:var(--txt);font-weight:500;padding:3px 0;cursor:pointer}
  .checks input{width:auto}
  .roles{display:flex;gap:10px}
  .roles label{display:flex;align-items:center;gap:6px;margin:0;text-transform:none;font-size:13px;font-weight:600;color:var(--txt)}
  .save{width:100%;margin-top:16px;padding:11px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
  .save:hover{background:#000000}
  .note{font-size:11px;color:var(--muted);margin-top:8px}
  .msg{margin-top:12px;font-size:12.5px;padding:10px;border-radius:9px;display:none}
  .msg.ok{display:block;background:#dcfce7;color:#15803d}.msg.err{display:block;background:#fee2e2;color:#b91c1c}
  #gate{padding:60px;text-align:center;color:var(--muted)}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="gate">Verificando acceso…</div>
<div class="wrap" id="app" style="display:none">
  <header>
    <div class="htitle"><img src="assets/garnier_brand_white.png" alt="Garnier"><h1>Administración de accesos</h1></div>
    <div class="right">
      <span id="who"></span>
      <a href="index.html">← Dashboard</a>
      <button id="logout">Salir</button>
    </div>
  </header>
  <div class="grid">
    <div class="card">
      <h2>Usuarios</h2>
      <table><thead><tr><th>Correo</th><th>Rol</th><th>Acceso</th><th></th></tr></thead>
        <tbody id="userList"></tbody></table>
    </div>
    <div class="card">
      <h2 id="formTitle">Agregar usuario</h2>
      <form id="form">
        <label>Correo</label>
        <input id="fEmail" type="email" placeholder="nombre@empresa.com" required>
        <label>Rol</label>
        <div class="roles">
          <label><input type="radio" name="rol" value="user" checked> Usuario</label>
          <label><input type="radio" name="rol" value="admin"> Administrador</label>
        </div>
        <label>Agencias permitidas <span style="text-transform:none;font-weight:400">(vacío = todas)</span></label>
        <div class="checks" id="agChecks"></div>
        <label>Cuentas permitidas <span style="text-transform:none;font-weight:400">(vacío = todas las de sus agencias)</span></label>
        <div class="checks tall" id="ctChecks"></div>
        <button class="save" type="submit">Guardar usuario</button>
        <div class="note">Admins ven todo sin importar las casillas. Usuarios sin agencias/cuentas marcadas ven el dashboard general.</div>
        <div class="msg" id="msg"></div>
      </form>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script>
let AGENCIAS=[], CUENTAS=[], ME=null;
const msg=(t,cls)=>{const m=document.getElementById('msg');m.textContent=t;m.className='msg '+cls;setTimeout(()=>{if(cls==='ok')m.className='msg';},3500);};

(async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){ location.replace('login.html'); return; }
  ME=session.user.email.toLowerCase();
  const {data:perm}=await sb.from('permisos').select('rol').eq('email',ME).maybeSingle();
  if(!perm || perm.rol!=='admin'){
    document.getElementById('gate').innerHTML='No tienes permisos de administrador.<br><a href="index.html">Ir al dashboard</a>';
    return;
  }
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('who').textContent=ME;
  // catálogo de agencias/cuentas desde la data pública
  const d=await (await fetch('data/tracking.json')).json();
  AGENCIAS=[...new Set(d.detalle.map(r=>r.agencia))].sort();
  CUENTAS=[...new Set(d.detalle.map(r=>JSON.stringify({c:r.cuenta,a:r.agencia})))].map(s=>JSON.parse(s))
            .sort((x,y)=>x.a.localeCompare(y.a)||x.c.localeCompare(y.c));
  renderChecks();
  document.getElementById('logout').onclick=()=>sb.auth.signOut().then(()=>location.replace('login.html'));
  document.getElementById('form').addEventListener('submit',onSave);
  loadUsers();
})();

function renderChecks(sel={ag:[],ct:[]}){
  document.getElementById('agChecks').innerHTML=AGENCIAS.map(a=>
    `<label><input type="checkbox" class="ag" value="${a}" ${sel.ag.includes(a)?'checked':''}>${a}</label>`).join('');
  document.getElementById('ctChecks').innerHTML=CUENTAS.map(o=>
    `<label><input type="checkbox" class="ct" value="${o.c.replace(/"/g,'&quot;')}" ${sel.ct.includes(o.c)?'checked':''}>${o.c} <span style="color:#9aa3b2">· ${o.a}</span></label>`).join('');
}

async function loadUsers(){
  const {data,error}=await sb.from('permisos').select('*').order('rol').order('email');
  if(error){ msg('Error cargando usuarios: '+error.message,'err'); return; }
  document.getElementById('userList').innerHTML=data.map(u=>{
    const ags=(u.agencias&&u.agencias.length)?u.agencias.join(', '):'Todas';
    const cts=(u.cuentas&&u.cuentas.length)?`${u.cuentas.length} cuenta(s)`:'Todas';
    return `<tr>
      <td>${u.email}</td>
      <td><span class="rol ${u.rol}">${u.rol}</span></td>
      <td class="scope">${u.rol==='admin'?'Todo':`Ag: ${ags}<br>Cta: ${cts}`}</td>
      <td><div class="act">
        <button class="edit" data-e="${u.email}">Editar</button>
        ${u.email===ME?'':`<button class="del" data-e="${u.email}">Borrar</button>`}
      </div></td></tr>`;
  }).join('');
  document.querySelectorAll('.edit').forEach(b=>b.onclick=()=>editUser(data.find(u=>u.email===b.dataset.e)));
  document.querySelectorAll('.del').forEach(b=>b.onclick=()=>delUser(b.dataset.e));
}

function editUser(u){
  document.getElementById('formTitle').textContent='Editar: '+u.email;
  document.getElementById('fEmail').value=u.email;
  document.querySelector(`input[name=rol][value=${u.rol}]`).checked=true;
  renderChecks({ag:u.agencias||[],ct:u.cuentas||[]});
  window.scrollTo({top:0,behavior:'smooth'});
}

async function delUser(email){
  if(!confirm('¿Quitar acceso a '+email+'?'))return;
  const {error}=await sb.from('permisos').delete().eq('email',email);
  if(error)msg('Error: '+error.message,'err'); else { msg('Usuario eliminado.','ok'); loadUsers(); }
}

async function onSave(e){
  e.preventDefault();
  const email=document.getElementById('fEmail').value.trim().toLowerCase();
  const rol=document.querySelector('input[name=rol]:checked').value;
  const agencias=[...document.querySelectorAll('.ag:checked')].map(c=>c.value);
  const cuentas=[...document.querySelectorAll('.ct:checked')].map(c=>c.value);
  const {error}=await sb.from('permisos').upsert({email,rol,agencias,cuentas},{onConflict:'email'});
  if(error){ msg('Error: '+error.message,'err'); return; }
  msg('✔ Guardado.','ok');
  document.getElementById('form').reset();
  document.getElementById('formTitle').textContent='Agregar usuario';
  renderChecks();
  loadUsers();
}
</script>
</body>
</html>
