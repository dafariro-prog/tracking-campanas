name: Análisis diario de campañas (Gemini)

on:
  schedule:
    # 12:30 UTC = 06:30 CR/PA. Corre después del refresco de data (11:00 UTC).
    - cron: "30 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci || npm install

      - name: Escribir credenciales de la Service Account
        run: echo "$GCP_SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Analizar campañas con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: node analyze.js

      - name: Commit si hubo cambios
        run: |
          git config user.name  "tracking-bot"
          git config user.email "actions@github.com"
          git add data/recommendations.json
          if git diff --staged --quiet; then
            echo "Sin cambios en recomendaciones."
          else
            git commit -m "chore: recomendaciones $(date -u +%Y-%m-%d)"
            git push
          fi
